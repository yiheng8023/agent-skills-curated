name: Candidate Skill or source
description: Propose a public Skill, suite, index, Hook, adapter, or tooling source for governed review.
title: "[candidate]: "
labels:
  - candidate
body:
  - type: markdown
    attributes:
      value: |
        A proposal is discovery input, not approval. Do not paste private, restricted, credential-bearing, or unlicensed material.
  - type: input
    id: source
    attributes:
      label: Canonical public source
      description: Link to the repository or authoritative source page.
      placeholder: https://github.com/owner/repository
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision or release
      description: Prefer a 40-character commit SHA. If unknown, explain why.
      placeholder: 0123456789abcdef0123456789abcdef01234567
  - type: textarea
    id: capability
    attributes:
      label: Concrete capability and shortfall
      description: State the task, current insufficiency, affected users or Agents, and expected benefit.
    validations:
      required: true
  - type: textarea
    id: structure
    attributes:
      label: Source structure
      description: List relevant Skill paths, suite components, Hooks, executables, installers, adapters, services, or indexes.
    validations:
      required: true
  - type: textarea
    id: license
    attributes:
      label: License and provenance
      description: Identify license files, authorship, copied components, notices, and unresolved redistribution limits.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security, account, data, cost, and side-effect boundaries
      description: Note network access, credentials, OAuth, writes, messages, uploads, payments, local persistence, and automatic Hooks.
    validations:
      required: true
  - type: textarea
    id: overlap
    attributes:
      label: Native, official, installed, and curated overlap
      description: Explain why existing capabilities may be insufficient and where redundancy or conflict may exist.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Submission boundary
      options:
        - label: I understand that this proposal does not authorize download, execution, installation, Hook enablement, adaptation, admission, or release.
          required: true
