name: Governance or verification problem
description: Report a registry, evidence, verifier, topology, release, or documentation inconsistency.
title: "[governance]: "
labels:
  - governance
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Describe the inconsistency and the exact file, command, report, or generated projection involved.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected contract
      description: State the authority source or documented invariant that should hold.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction and evidence
      description: Provide safe steps, revision, platform, command output summary, and links. Remove secrets and private state.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Primary surface
      options:
        - Registry or schema
        - Source pin or provenance
        - License or attribution
        - Security or privacy boundary
        - Portability or adapter
        - Overlap, conflict, or redundancy
        - Verifier or test
        - Generated topology or manifest
        - Documentation projection
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Public-data check
      options:
        - label: I removed credentials, private configuration, personal memory, restricted content, and raw sensitive logs.
          required: true
