name: discover-candidate-sources

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout immutable Action revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Run read-only GitHub discovery
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          python scripts/discover_github_skill_sources.py
          --profile registry/github-skill-discovery-profile.json
          --output .tmp/discovery/github-skill-discovery-snapshot.json
          --summary .tmp/discovery/github-skill-discovery-summary.md
      - name: Publish discovery summary
        run: cat .tmp/discovery/github-skill-discovery-summary.md >> "$GITHUB_STEP_SUMMARY"
